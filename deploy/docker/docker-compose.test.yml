# =============================================================================
# CityOSJarvis Test Stack — Minimal
# =============================================================================
# Uses existing CityOS monorepo infrastructure:
#   - postgres (cityos-postgres :5432)
#   - redis    (cityos-redis :6379)
#
# Brings up only AI stack services for E2E testing.
# =============================================================================

name: cityosjarvis-test

services:
  cityosjarvis:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.cityos
      args:
        BASE_IMAGE: ${BASE_IMAGE:-python:3.13-slim}
        WHISPER_MODEL: ${WHISPER_MODEL:-base}
        ENABLE_TTS: ${ENABLE_TTS:-false}
    image: cityosjarvis:local
    container_name: cityosjarvis-local
    ports:
      - "${PORT_CITYOSJARVIS:-8001}:8000"
    environment:
      OPENJARVIS_API_KEY: ${OPENJARVIS_API_KEY:-cityos-local-key}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-cityos}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-cityosjarvis}
      DATABASE_URL: ${DATABASE_URL:-postgresql://cityos:cityos_dev@host.docker.internal:5432/jarvis}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      CITYOS_AUDIT_DIR: /var/log/cityosjarvis
      CITYOS_LOG_LEVEL: ${CITYOS_LOG_LEVEL:-DEBUG}
      CITYOSJARVIS_LLM_MODE: ${CITYOSJARVIS_LLM_MODE:-gateway}
      CITYOSJARVIS_LLM_MODEL: ${CITYOSJARVIS_LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-http://litellm:4000}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      ENABLE_TTS: ${ENABLE_TTS:-false}
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-}
      LOKI_URL: ${LOKI_URL:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-cityos-local}
    volumes:
      - cityosjarvis-audit:/var/log/cityosjarvis
    depends_on:
      litellm:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - cityos

  litellm:
    image: ghcr.io/berriai/litellm:${LITELLM_IMAGE_TAG:-main-latest}
    container_name: litellm-local
    ports:
      - "${PORT_LITELLM:-4000}:4000"
    volumes:
      - ../../infra/litellm/config.yaml:/app/config.yaml:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-cityos-local}
    command:
      - --config
      - /app/config.yaml
      - --detailed_debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - cityos

  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    container_name: ollama-local
    ports:
      - "${PORT_OLLAMA:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-0}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - cityos

volumes:
  cityosjarvis-audit:
  ollama-models:

networks:
  cityos:
    external: true
    name: cityos
