name: Sync Upstream

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync from OpenJarvis upstream
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: cityos/main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/open-jarvis/OpenJarvis.git || true
          git fetch upstream main

      - name: Check for changes
        id: check
        run: |
          BEHIND=$(git rev-list --count cityos/main..upstream/main || echo 0)
          echo "commits_behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Upstream is $BEHIND commits ahead"

      - name: Clean stale sync branches
        if: steps.check.outputs.commits_behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete sync branches older than 7 days that have no open PR
          gh api repos/${{ github.repository }}/git/refs/heads --paginate \
            | jq -r '.[] | select(.ref | startswith("refs/heads/sync/upstream-")) | .ref' \
            | sed 's|refs/heads/||' | while read branch; do
              pr_count=$(gh pr list --repo ${{ github.repository }} --head "$branch" --state open --json number | jq 'length')
              if [ "$pr_count" -eq 0 ]; then
                echo "Deleting stale branch: $branch"
                gh api repos/${{ github.repository }}/git/refs/heads/$branch -X DELETE || true
              fi
            done

      - name: Create sync branch
        if: steps.check.outputs.commits_behind != '0'
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          echo "branch=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"
          # Merge without auto-commit so we can resolve conflicts manually
          git merge upstream/main --no-commit --allow-unrelated-histories -X ours || true
          # Resolve CityOS-specific files by keeping ours
          git checkout --ours src/openjarvis/cityos/ tests/cityos/ deploy/docker/Dockerfile.cityos scripts/install/*.sh src/openjarvis/agents/hybrid/scripts/*.sh || true
          git add -A
          # Resolve any remaining conflicts by keeping ours
          UNMERGED=$(git diff --cached --diff-filter=U --name-only)
          if [ -n "$UNMERGED" ]; then
            echo "Remaining unmerged files: $UNMERGED"
            git checkout --ours .
            git add -A
          fi
          # Commit the merge result
          git commit -m "chore: sync upstream $(date +%Y-%m-%d)" || true
          git push origin "$BRANCH" --force

      - name: Create Pull Request
        if: steps.check.outputs.commits_behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          # Check if PR already exists
          EXISTING=$(gh pr list --repo ${{ github.repository }} --head "$BRANCH" --state open --json number | jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists for $BRANCH"
            gh pr list --repo ${{ github.repository }} --head "$BRANCH" --state open --json url | jq -r '.[].url'
          else
            gh pr create \
              --title "chore: sync upstream $(date +%Y-%m-%d)" \
              --body "Automated upstream sync from open-jarvis/OpenJarvis.\n\n- Commits behind: ${{ steps.check.outputs.commits_behind }}\n- CityOS-specific files preserved (cityos/, Dockerfile.cityos)\n\nPlease review for breaking changes." \
              --base cityos/main \
              --head "$BRANCH" \
              --label "upstream-sync"
          fi

      - name: No changes needed
        if: steps.check.outputs.commits_behind == '0'
        run: echo "Upstream is up to date. No sync needed."
