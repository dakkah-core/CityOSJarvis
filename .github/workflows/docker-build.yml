name: Build Docker Image

on:
  push:
    branches: [cityos/main]
    tags: ['v*']
  pull_request:
    branches: [cityos/main]
    paths:
      - 'deploy/docker/**'
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'configs/**'
  workflow_dispatch:
    inputs:
      publish-image:
        description: 'Publish to GHCR'
        required: false
        default: false
        type: boolean
      base-image:
        description: 'Base image variant'
        required: false
        default: 'python:3.13-slim'
        type: choice
        options:
          - python:3.13-slim
          - nvidia/cuda:12.0-base-ubuntu22.04

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERFILE: deploy/docker/Dockerfile.cityos

jobs:
  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free runner disk
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          docker builder prune -af || true
          echo "Disk after cleanup:"
          df -h /

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=cityosjarvis-docker
          cache-to: type=gha,scope=cityosjarvis-docker,mode=max
          build-args: |
            BASE_IMAGE=${{ github.event.inputs.base-image || 'python:3.13-slim' }}
            WHISPER_MODEL=base
            ENABLE_TTS=true

      - name: Verify health check
        run: |
          docker run -d --name cityosjarvis-test -p 8000:8000 \
            -e OPENJARVIS_API_KEY=ci-test-key \
            -e CITYOS_AUDIT_DIR=/tmp/audit \
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          echo "Waiting for health check..."
          for i in {1..30}; do
            if curl -fs http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed!"
              docker stop cityosjarvis-test
              docker rm cityosjarvis-test
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker logs cityosjarvis-test
          docker stop cityosjarvis-test || true
          docker rm cityosjarvis-test || true
          exit 1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
          retention-days: 14

      - name: Log into GHCR
        if: ${{ github.event.inputs.publish-image == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push multi-arch image
        if: ${{ github.event.inputs.publish-image == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, github.ref_name) || '' }}
          cache-from: type=gha,scope=cityosjarvis-docker
          build-args: |
            BASE_IMAGE=${{ github.event.inputs.base-image || 'python:3.13-slim' }}
            WHISPER_MODEL=base
            ENABLE_TTS=true

      - name: Create build manifest
        run: |
          cat > build-manifest.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "runId": "${{ github.run_id }}",
            "commitSha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "pythonVersion": "3.13",
            "baseImage": "${{ github.event.inputs.base-image || 'python:3.13-slim' }}",
            "imageDigest": "${{ steps.build.outputs.digest }}",
            "timestampUtc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload build manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: build-manifest.json
          retention-days: 30
