server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: cityosjarvis-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: cityosjarvis-audit
          __path__: /var/log/cityosjarvis/audit.jsonl
          service: cityosjarvis
          environment: ${ENVIRONMENT:-production}
    pipeline_stages:
      - json:
          expressions:
            tenant_id: tenant_id
            event_type: event
            correlation_id: correlation_id
            actor_sub: actor.sub
            latency_ms: latency_ms
      - labels:
          tenant_id:
          event_type:
          correlation_id:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: cityosjarvis-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: cityosjarvis-app
          __path__: /var/log/cityosjarvis/*.log
          service: cityosjarvis
          environment: ${ENVIRONMENT:-production}
