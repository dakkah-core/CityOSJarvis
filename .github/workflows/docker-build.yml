name: Build Docker Image

on:
  push:
    branches: [cityos/main]
    tags: ['v*']
  pull_request:
    branches: [cityos/main]
    paths:
      - 'deploy/docker/**'
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'configs/**'
  workflow_dispatch:
    inputs:
      publish-image:
        description: 'Publish to GHCR'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERFILE: deploy/docker/Dockerfile.cityos

jobs:
  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free runner disk
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          docker builder prune -af || true
          echo "Disk after cleanup:"
          df -h /

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=cityosjarvis-docker
          cache-to: type=gha,scope=cityosjarvis-docker,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
          retention-days: 14

      - name: Log into GHCR
        if: ${{ github.event.inputs.publish-image == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: ${{ github.event.inputs.publish-image == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        run: |
          docker tag ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            docker tag ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}
            docker tag ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          fi

      - name: Create build manifest
        run: |
          cat > build-manifest.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "runId": "${{ github.run_id }}",
            "commitSha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "pythonVersion": "3.12",
            "imageDigest": "${{ steps.build.outputs.digest }}",
            "timestampUtc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload build manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: build-manifest.json
          retention-days: 30
