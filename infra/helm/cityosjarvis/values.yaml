replicaCount: 2

image:
  repository: ghcr.io/dakkah-core/cityosjarvis
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: jarvis.dakkah.city
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: jarvis-tls
      hosts:
        - jarvis.dakkah.city

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - cityosjarvis
          topologyKey: kubernetes.io/hostname

gpu:
  enabled: false
  nodeSelector:
    nvidia.com/gpu.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  resources:
    limits:
      nvidia.com/gpu: 1

env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: ENABLE_TTS
    value: "true"
  - name: ENABLE_AUDIT
    value: "true"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://temporal-frontend:4317"

envFromSecrets:
  - name: CARTESIA_API_KEY
    secretName: cityosjarvis-secrets
    secretKey: cartesia-api-key
  - name: DATABASE_URL
    secretName: cityosjarvis-secrets
    secretKey: database-url
  - name: REDIS_URL
    secretName: cityosjarvis-secrets
    secretKey: redis-url

persistence:
  enabled: true
  storageClass: "fast-ssd"
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /app/data

postgresql:
  enabled: true
  auth:
    username: jarvis
    database: jarvis
    existingSecret: cityosjarvis-secrets
    secretKeys:
      userPasswordKey: postgres-password

redis:
  enabled: true
  auth:
    enabled: true
    existingSecret: cityosjarvis-secrets
    existingSecretPasswordKey: redis-password

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
