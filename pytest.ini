[pytest]
testpaths = tests
addopts = -v --tb=short --basetemp=../.tmp-cityosjarvis-pytest
asyncio_mode = auto
markers =
    amd: requires AMD GPU
    apple: requires Apple Silicon
    cloud: requires cloud API keys
    docker: requires a working Docker daemon
    live: requires running inference engine or live local integration
    macos15: requires macOS 15+ (Sequoia) for Apple FM
    live_channel: requires real channel credentials
    nvidia: requires NVIDIA GPU
    slow: long-running test
    live_external: requires HERMES_AGENT_PATH and OPENCLAW_PATH
    modal: requires Modal token + network
