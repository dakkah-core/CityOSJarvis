name: Deploy to VPS

on:
  push:
    branches: [cityos/main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dakkah-core/cityosjarvis

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.cityos
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cityosjarvis-docker
          cache-to: type=gha,scope=cityosjarvis-docker,mode=max
          build-args: |
            BASE_IMAGE=${{ github.event.inputs.base-image || 'python:3.13-slim' }}
            WHISPER_MODEL=base
            ENABLE_TTS=true

  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Deploy via CMS ops-helper
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CITYOSJARVIS_REPO_URL: https://github.com/${{ github.repository }}.git
          CITYOSJARVIS_REF: ${{ github.sha }}
          CITYOSJARVIS_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          CITYOSJARVIS_DEPLOY_MODE: build
        with:
          host: ${{ secrets.VPS_HOST || secrets.VPS_STAGING_HOST }}
          username: ${{ secrets.VPS_USER || secrets.VPS_STAGING_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.VPS_STAGING_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || secrets.VPS_STAGING_PORT || '22' }}
          envs: GITHUB_TOKEN,CITYOSJARVIS_REPO_URL,CITYOSJARVIS_REF,CITYOSJARVIS_IMAGE,CITYOSJARVIS_DEPLOY_MODE
          script: |
            set -euo pipefail
            echo "=== Deploying CityOSJarvis through CMS ops-helper ==="
            export VPS_APP_DIR="${VPS_APP_DIR:-/opt/dakkah-cityos-platform}"
            export VPS_SOURCE_DIR="${VPS_SOURCE_DIR:-/opt/dakkah-cityos-cms-src}"
            export CITYOS_COMPOSE_ENV_FILE="${CITYOS_COMPOSE_ENV_FILE:-${VPS_APP_DIR}/.env}"
            export CITYOSJARVIS_HOST_SOURCE_DIR="${CITYOSJARVIS_HOST_SOURCE_DIR:-/opt/dakkah-cityosjarvis-src}"

            mkdir -p "${CITYOSJARVIS_HOST_SOURCE_DIR}"
            cd "${VPS_SOURCE_DIR}"

            docker compose \
              -p cityos-helpers \
              -f deploy/docker-compose.helpers.yml \
              --profile ops \
              --env-file "${CITYOS_COMPOSE_ENV_FILE}" \
              run --rm --no-deps \
              -e GITHUB_TOKEN \
              -e CITYOSJARVIS_REPO_URL \
              -e CITYOSJARVIS_REF \
              -e CITYOSJARVIS_IMAGE \
              -e CITYOSJARVIS_DEPLOY_MODE \
              -e CITYOSJARVIS_HOST_SOURCE_DIR \
              cityos-ops-helper jarvis-deploy "${CITYOSJARVIS_REF}"
