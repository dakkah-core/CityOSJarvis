name: Python Tests

on:
  push:
    branches: [cityos/main]
  pull_request:
    branches: [cityos/main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.6.x"

jobs:
  lint-and-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --extra dev --extra server --extra scheduler --extra speech

      - name: Ruff check
        run: uv run ruff check src tests --output-format=github

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Pyright type check
        run: uv run pyright src/openjarvis/cityos

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --extra dev --extra server --extra scheduler --extra speech

      - name: Run unit tests
        run: uv run pytest tests/cityos/test_auth.py tests/cityos/test_tenant.py tests/cityos/test_compliance.py tests/cityos/test_audit.py tests/cityos/test_tools.py -v --tb=short --junitxml=test-results/unit-results.xml
        env:
          CITYOS_JWT_SECRET: ci-jwt-secret-32-chars-minimum!!
          CITYOS_TENANT_HEADER: X-CityOS-Tenant-Id

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit-results.xml
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --extra dev --extra server --extra scheduler --extra speech

      - name: Run integration tests
        run: uv run pytest tests/cityos/test_integration_chat.py -v --tb=short --junitxml=test-results/integration-results.xml
        env:
          CITYOS_JWT_SECRET: ci-jwt-secret-32-chars-minimum!!
          CITYOS_TENANT_HEADER: X-CityOS-Tenant-Id
          CITYOS_AUDIT_DIR: /tmp/cityosjarvis-audit

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/integration-results.xml
          retention-days: 14

  security-tests:
    name: Security Tests (PHI/PII)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --extra dev --extra server --extra scheduler --extra speech

      - name: Run security tests
        run: uv run pytest tests/cityos/test_security_phi_injection.py -v --tb=short --junitxml=test-results/security-results.xml
        env:
          CITYOS_JWT_SECRET: ci-jwt-secret-32-chars-minimum!!
          CITYOS_TENANT_HEADER: X-CityOS-Tenant-Id
          CITYOS_AUDIT_DIR: /tmp/cityosjarvis-audit

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: test-results/security-results.xml
          retention-days: 14

      - name: Audit log check
        run: |
          if [ -d /tmp/cityosjarvis-audit ]; then
            echo "Audit entries generated:"
            wc -l /tmp/cityosjarvis-audit/audit.jsonl || true
            echo "Sample entries:"
            head -n 3 /tmp/cityosjarvis-audit/audit.jsonl || true
          fi

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint-and-type, unit-tests, integration-tests, security-tests]
    if: always()

    steps:
      - name: Summarize results
        run: |
          echo "## CityOSJarvis Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint-and-type.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests | ${{ needs.security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
